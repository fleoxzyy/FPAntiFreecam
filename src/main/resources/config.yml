# ============================================================
#  FPAntiFreeCam  –  Configuration
#  Anti-FreeCam protection for Spigot / Paper / Folia
#  1.19 · 1.20 · 1.21 · 26.1+
# ============================================================

# PLEASE DO NOT CHANGE!!
config-version: 3.1

# ── General ──────────────────────────────────────────────────
settings:
  # Check for updates on startup and notify admins (fpantifreecam.admin permission) on join.
  update-checker: true

  # Language file in plugins/FPAntiFreeCam/lang/<language>.yml
  language: "en"

  # Print verbose debug info to console (leave false in production)
  debug-mode: false

  # Seconds a player must wait between FreeCam-state refresh triggers.
  # Prevents spam-refreshing when rapidly crossing the surface Y level.
  refresh-cooldown-seconds: 3

# ── Protected worlds ─────────────────────────────────────────
# Add every world name that should have underground-hiding active.
# Tip: avoid nether/end worlds – they can cause visual glitches.
worlds:
  list:
    - "world"
    # - "survival"
    # - "resource_world"

# ── FreeCam protection thresholds ────────────────────────────
protection:
  # Y level at-or-above which the hiding effect is ALWAYS active (Surface).
  # High values (e.g. 64) hide everything deep while you are on the surface.
  surface-y: 64.0

  # Every block/entity at-or-below this Y will be replaced with the void block
  # (replacement.block-type) when the protection is active.
  void-y: 15

  # Absolute Y floor for deep deactivation (Underground).
  # If a player's feet drop BELOW this Y, protection is ALWAYS deactivated.
  # This fixes the "void-underground" bug where digging straight down near
  # the void-y level would show only air beneath you.
  # Should be set a few blocks above void-y (e.g. 20.0 if void-y is 15).
  deep-deactivation-y: 20.0

  # Raycast-based activation (look-up-from-cave check).
  # Active for players in the transition zone (between deep-deactivation-y and surface-y).
  # If they look up OR have sky access, protection arms to prevent exploit.
  raycast:
    enabled: true
    # Minimum upward angle (0.0–1.0) to trigger protection. ~0.15 ≈ 9° above horizontal.
    min-upward-angle: 0.15
    # Milliseconds of stability required before deactivating/activating via raycast.
    # Prevents flicker when digging or moving jittery.
    deactivation-debounce-ms: 500

# ── Replacement block ─────────────────────────────────────────
# Block type sent to the client in place of hidden underground blocks.
# "air" produces a clean void look (recommended).
# "stone" can be used to fake a solid floor instead.
replacement:
  block-type: "air"

# ── Entity hiding ─────────────────────────────────────────────
entities:
  # Hide non-player entities that are inside the hidden zone.
  # Prevents FreeCam from revealing mob farms / storage mobs.
  hide-entities: true

# ── Performance ───────────────────────────────────────────────
performance:
  # Folia: enable region-aware chunk scheduling (auto-detected)
  folia-optimizations: true

  # Paper/Spigot: max chunks refreshed per server tick
  max-chunks-per-tick: 40

  # Instant protection: force a large-radius refresh when a player
  # first enters the surface-y zone so bases are hidden immediately.
  instant-protection:
    enabled: true
    # Chunks radius to refresh when instant protection fires
    instant-load-radius: 14
    # Pre-load distance in blocks above surface-y where instant refresh is armed
    pre-load-distance: 10
    # Force re-encode of chunk data immediately (prevents momentary base glimpse)
    force-immediate-refresh: true

  # Limit the hidden-block effect to a smaller radius around each player.
  # Reduces packet processing on large servers; set enabled: true to activate.
  limited-area:
    enabled: false
    chunk-radius: 4
